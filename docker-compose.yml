services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ctf_harness
      POSTGRES_USER: ctf
      POSTGRES_PASSWORD: ctf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctf -d ctf_harness"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  control_plane:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://ctf:ctf@postgres:5432/ctf_harness
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: ctf-harness
      RUNS_DIR: /data/runs
      DOCKER_BIND_RUNS_DIR: /data/runs
      DOCKER_SOCKET: unix://var/run/docker.sock
      SANDBOX_IMAGE: ctf-agent-sandbox:latest
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      SANDBOX_ENV_PASSTHROUGH: ${SANDBOX_ENV_PASSTHROUGH:-OPENAI_API_KEY,OPENAI_BASE_URL,OPENAI_ORG_ID,OPENAI_PROJECT_ID,CODEX_API_KEY,CODEX_BASE_URL,CODEX_MODEL,CODEX_CLI_CMD,CODEX_JSONL_LIVE_LOG_ONLY,CODEX_FLAG_VERIFY_MCP_ENABLED,CODEX_CRYPTO_MCP_ENABLED,CODEX_GHIDRA_MCP_ENABLED,SANDBOX_IDA_MCP_ENABLED,CODEX_IDA_MCP_ENABLED,GHIDRA_VERSION,GHIDRA_URL,GHIDRA_INSTALL_DIR,ANTHROPIC_API_KEY,CLAUDE_CODE_CLI_CMD}
      SANDBOX_CODEX_AUTH_INCLUDE: ${SANDBOX_CODEX_AUTH_INCLUDE:-auth.json,credentials.json,token.json,*auth*.json,*token*.json,*credential*.json,*session*.json}
      SANDBOX_PTRACE_ENABLED: ${SANDBOX_PTRACE_ENABLED:-true}
      SANDBOX_SECCOMP_UNCONFINED: ${SANDBOX_SECCOMP_UNCONFINED:-false}
      SANDBOX_IDA_MCP_ENABLED: ${SANDBOX_IDA_MCP_ENABLED:-false}
      SANDBOX_IDA_PATH: ${SANDBOX_IDA_PATH:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_NOTIFY_ON_FLAG: ${DISCORD_NOTIFY_ON_FLAG:-true}
      DISCORD_NOTIFY_INCLUDE_FLAG: ${DISCORD_NOTIFY_INCLUDE_FLAG:-true}
    ports:
      - "8000:8000"
    restart: on-failure
    volumes:
      - ./runs:/data/runs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      control_plane:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
