name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest -q tests/unit

  integration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Build and start stack
        env:
          SANDBOX_IMAGE: ctf-agent-sandbox-ci:latest
          SANDBOX_BUILD_TARGET: ci
        run: docker compose up -d --build postgres minio control_plane

      - name: Wait for control plane health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Control plane did not become healthy in time"
          docker compose logs control_plane
          exit 1

      - name: Run smoke test
        env:
          RUN_SMOKE: "1"
        run: python -m pytest -q tests/integration/test_smoke_mock_run.py

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  frontend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Typecheck
        run: npm --prefix frontend run typecheck

      - name: Run frontend unit tests
        run: npm --prefix frontend run test:run

      - name: Build frontend
        run: npm --prefix frontend run build

  frontend-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Build and start full stack
        env:
          SANDBOX_IMAGE: ctf-agent-sandbox-ci:latest
          SANDBOX_BUILD_TARGET: ci
        run: docker compose up -d --build

      - name: Wait for backend and frontend health
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8000/healthz > /dev/null && curl -fsS http://localhost:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become healthy in time"
          docker compose logs --no-color
          exit 1

      - name: Seed challenge via integration smoke setup
        env:
          RUN_SMOKE: "1"
        run: python -m pytest -q tests/integration/test_smoke_mock_run.py

      - name: Run frontend e2e smoke
        run: npm --prefix frontend run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
