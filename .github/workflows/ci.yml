name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest -q tests/unit

  integration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for control plane health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Control plane did not become healthy in time"
          docker compose logs control_plane
          exit 1

      - name: Run smoke test
        env:
          RUN_SMOKE: "1"
        run: python -m pytest -q tests/integration/test_smoke_mock_run.py

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
